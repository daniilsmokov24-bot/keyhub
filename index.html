<script type="text/babel" data-presets="react">
const { useState, useEffect, useMemo, useRef, useContext, createContext } = React;

// lucide icons as React components, rendered via lucide UMD data-attributes.
// PascalCase name -> kebab-case (Trash2 -> trash-2, ArrowLeftRight -> arrow-left-right)
function toKebab(name) {
  return name.replace(/([a-z0-9])([A-Z])/g, '$1-$2').replace(/([A-Z])([A-Z][a-z])/g, '$1-$2').toLowerCase();
}
function makeIcon(name) {
  const kebab = toKebab(name);
  return function Icon(props) {
    const ref = useRef(null);
    const size = props.size || 24;
    const color = props.color || 'currentColor';
    useEffect(() => {
      const el = ref.current;
      if (!el || !window.lucide) return;
      el.innerHTML = '';
      const i = document.createElement('i');
      i.setAttribute('data-lucide', kebab);
      el.appendChild(i);
      try { window.lucide.createIcons({ attrs: { width: size, height: size, stroke: color } }); } catch (e) {}
      // apply size/color to the produced svg (createIcons attrs can be ignored in some versions)
      const svg = el.querySelector('svg');
      if (svg) {
        svg.setAttribute('width', size);
        svg.setAttribute('height', size);
        svg.setAttribute('stroke', color);
      }
    });
    return React.createElement('span', { ref, style: { display: 'inline-flex', alignItems: 'center', lineHeight: 0, ...(props.style||{}) } });
  };
}
const Plus = makeIcon('Plus');
const Search = makeIcon('Search');
const Trash2 = makeIcon('Trash2');
const ChevronDown = makeIcon('ChevronDown');
const ChevronRight = makeIcon('ChevronRight');
const Package = makeIcon('Package');
const ChevronLeft = makeIcon('ChevronLeft');
const AlertCircle = makeIcon('AlertCircle');
const Check = makeIcon('Check');
const X = makeIcon('X');
const Copy = makeIcon('Copy');
const ArrowLeft = makeIcon('ArrowLeft');
const Wand2 = makeIcon('Wand2');
const Gift = makeIcon('Gift');
const RefreshCw = makeIcon('RefreshCw');
const ArrowLeftRight = makeIcon('ArrowLeftRight');
const Download = makeIcon('Download');
const Upload = makeIcon('Upload');
const Users = makeIcon('Users');


const MobileCtx = createContext(false);
const useMobile = () => useContext(MobileCtx);

// ============ PARSER (ported logic from key_parser.py) ============

const KEY_REGEX_SEGMENTED = /\b[A-Za-z0-9]{4,12}(?:[-_][A-Za-z0-9]{1,12}){1,7}\b/;
const KEY_REGEX_LONG_ALNUM = /\b(?=[A-Za-z0-9_]*\d)[A-Za-z0-9_]{10,}\b/;
const KEY_REGEX_SHORT_CODE = /\b(?=[A-Za-z0-9]*\d)[A-Za-z0-9]{6,10}\b/;
const UUID_REGEX = /^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$/;

const TRASH_TITLES = new Set(['elite starter pack', 'vip ticket', 'event ticket']);

const TRASH_NAME_PATTERNS = [
  /\b(?:vip|event|festival|digital)\s+ticket\b/i,
  /\bvanity\b/i,
  /\b\d+\s+days\s+of\b/i,
  /\bE3\b/,
  /\b(?:xp|exp|credit|affinity|resource|premium)\s+booster\b/i,
];

function looksLikeKey(token) {
  if (!token) return false;
  const t = token.trim();
  if (UUID_REGEX.test(t)) return false;
  // canonical Steam-style key: 3+ groups of 4-5 alphanumerics joined by dashes
  // (e.g. WGTEN-HIYML-RHXXH) — valid even with zero digits
  if (/^[A-Za-z0-9]{4,5}(?:-[A-Za-z0-9]{4,5}){2,6}$/.test(t)) return true;
  // Amazon-style / letter-only key: 3+ dash groups of 3-8 chars, ALL UPPERCASE, no digits
  // (e.g. TYPY-BNQUUP-LUBB). Uppercase requirement avoids matching titles like "Tomb-Raider-Deluxe".
  if (/^[A-Z0-9]{3,8}(?:-[A-Z0-9]{3,8}){2,6}$/.test(t) && t === t.toUpperCase()) return true;
  if (KEY_REGEX_SEGMENTED.test(t) && t.includes('-')) {
    if (/\d/.test(t)) return true;
    if ((t.match(/-/g) || []).length >= 3) return true;
    return false;
  }
  if (KEY_REGEX_LONG_ALNUM.test(t)) return true;
  if (KEY_REGEX_SHORT_CODE.test(t)) return true;
  return false;
}

function extractKeyFromLine(line) {
  const candidates = [];
  const segMatches = line.match(new RegExp(KEY_REGEX_SEGMENTED.source, 'g'));
  if (segMatches) candidates.push(...segMatches);
  for (const c of candidates) if (looksLikeKey(c)) return c.trim();
  const longMatches = line.match(new RegExp(KEY_REGEX_LONG_ALNUM.source, 'g'));
  if (longMatches) for (const c of longMatches) if (looksLikeKey(c)) return c.trim();
  return null;
}

function cleanName(name) {
  let n = name;
  n = n.replace(/[™®]/g, '').replace(/\(tm\)/gi, '');
  n = n.replace(/\((steam|epic|uplay|origin|ea app|gog|battle\.net|humble monthly|rockstar)\)/gi, '');
  n = n.replace(/\(remastered\)/gi, ': Remastered');
  n = n.replace(/\+?\s*\d+%\s*off\s*(coupon)?/gi, '');
  n = n.replace(/\bcoupon\b/gi, '');
  n = n.replace(/\$\d+\s*tier/gi, '');
  // strip supplier listing noise: "... Steam CD Key", "Ubisoft Connect CD Key", region tags, etc.
  n = n.replace(/\b(ubisoft\s*connect|uplay|ea\s*app|origin|epic\s*games?(\s*store)?|gog(\.com)?|battle\.?net|rockstar(\s*games)?|microsoft\s*store|xbox\s*(live)?|psn|playstation|nintendo)\b/gi, '');
  n = n.replace(/\b(cd\s*key|game\s*key|steam\s*key|activation\s*key|key)\b/gi, '');
  // "Standard Edition" = базовая версия, это та же игра что и без суффикса → убираем,
  // чтобы "Directive 8020" и "Directive 8020 Standard Edition" слились в одну.
  // Deluxe/Ultimate/GOTY НЕ трогаем — это отдельные товары с другой ценой.
  n = n.replace(/[\s\-:|,]*\b(standard|base|vanilla)\s+(edition|ed\.?)\b/gi, '');
  n = n.replace(/\b(steam|epic|gog)\b\s*$/gi, ''); // trailing platform left after "key" removed
  n = n.replace(/\b(europe|eu|global|worldwide|ww|row|na|north\s*america|emea|region\s*free|multilanguage|multi)\b/gi, '');
  n = n.replace(/\bfor\s+(pc|steam|xbox|ps[45]?)\b/gi, '');
  n = n.replace(/[\s\-:|,]+$/g, '');
  n = n.replace(/^[\s\-:|,]+/g, '');
  n = n.replace(/\s{2,}/g, ' ').trim();
  n = n.replace(/[\s\-:|]+$/g, '').trim();
  return n;
}

function isTrash(name) {
  const lower = name.toLowerCase().trim();
  if (!lower) return true;
  if (TRASH_TITLES.has(lower)) return true;
  for (const p of TRASH_NAME_PATTERNS) if (p.test(name)) return true;
  return false;
}

function parseSupplierText(raw) {
  const lines = raw.split('\n').map(l => l.replace(/\r/g, ''));
  const games = new Map(); // groups duplicate game names WITHIN this one import
  const trash = [];
  const processed = [];
  for (let i = 0; i < lines.length; i++) {
    let line = lines[i].trim();
    // skip telegram/chat headers like "Nickname, [23 Jun 2026 at 14:12:42]:"
    if (/\[\d{1,2}\s+\w+\s+\d{4}.*\]/.test(line) || /^\S+,\s*\[.*\]:?$/.test(line)) continue;
    // strip leading voucher/code label prefix: "CODE: XXXX", "Код: XXXX", "Key: XXXX"
    line = line.replace(/^(code|код|key|ключ|cd[\s-]?key)\s*:\s*/i, '');
    if (line) processed.push(line);
  }

  let i = 0;
  const consumed = new Array(processed.length).fill(false);
  while (i < processed.length) {
    const line = processed[i];

    if (line.includes('|')) {
      const parts = line.split('|').map(p => p.trim()).filter(Boolean);
      if (parts.length >= 2) {
        let foundKey = null, nameParts = [];
        for (const p of parts) {
          if (!foundKey && looksLikeKey(p)) foundKey = p; else nameParts.push(p);
        }
        if (foundKey) {
          addEntry(games, trash, cleanName(nameParts.join(' ').trim() || parts[0]), foundKey);
          i++; continue;
        }
      }
    }

    if (line.includes('\t')) {
      const parts = line.split('\t').map(p => p.trim()).filter(Boolean);
      if (parts.length >= 2) {
        let foundKey = null, nameParts = [];
        for (const p of parts) {
          if (!foundKey && looksLikeKey(p)) foundKey = p; else nameParts.push(p);
        }
        if (foundKey) {
          addEntry(games, trash, cleanName(nameParts.join(' ')), foundKey);
          i++; continue;
        }
      }
    }

    const inlineKey = extractKeyFromLine(line);
    if (inlineKey && line.replace(inlineKey, '').trim().length > 1) {
      addEntry(games, trash, cleanName(line.replace(inlineKey, '').trim()), inlineKey);
      i++; continue;
    }

    if (looksLikeKey(line) && !/\s/.test(line)) {
      const isPriceLine = s => {
        if (!s) return false;
        const t = s.trim();
        const rest = t.replace(/^[~$€£]?\s*\d+(?:[.,]\d+)?\s*(usd|eur|gbp|pln|rub|€|\$|£)?\s*/i, '');
        if (rest === t) return false;
        return /^(clear|clean|price|ok|done|куплено|продано|готово|\s)*$/i.test(rest);
      };
      const isKeyLine = s => s && looksLikeKey(s) && !/\s/.test(s);
      const below = processed[i + 1];
      const below2 = processed[i + 2];

      // FORMAT A (key -> name -> price): line below is a name, and the line after it is a PRICE.
      // The price line is the reliable signal that distinguishes this from classic "name above key".
      const belowIsName = below && !isKeyLine(below) && !isPriceLine(below) && below.trim().length > 1;
      const aFollowedByPrice = belowIsName && below2 !== undefined && isPriceLine(below2);
      if (aFollowedByPrice) {
        addEntry(games, trash, cleanName(below), line, parsePriceValue(below2));
        consumed[i + 1] = true;
        consumed[i + 2] = true;
        i += 3;
        continue;
      }

      // FORMAT B: name above the key (walk back past other keys, price lines, consumed lines)
      let j = i - 1;
      while (j >= 0 && (consumed[j] || isKeyLine(processed[j]) || isPriceLine(processed[j]))) j--;
      const nameAbove = (j >= 0 && !consumed[j]) ? processed[j] : null;
      if (nameAbove && !isKeyLine(nameAbove) && !isPriceLine(nameAbove)) {
        addEntry(games, trash, cleanName(nameAbove), line);
        i++; continue;
      }

      // fallback: name below even if no price after (e.g. "PEAK ... GLOBAL...")
      if (belowIsName) {
        addEntry(games, trash, cleanName(below), line);
        consumed[i + 1] = true;
        i += 2;
        continue;
      }

      trash.push({ raw: line, reason: 'ключ без названия игры рядом' });
      i++; continue;
    }

    const nextLine = processed[i + 1];
    if (nextLine && looksLikeKey(nextLine) && !/\s/.test(nextLine)) { i++; continue; }

    if (line.length > 0) trash.push({ raw: line, reason: 'не удалось распознать формат' });
    i++;
  }

  // dedupe keys within each game group (handles same game appearing twice in pasted text)
  const result = [];
  for (const g of games.values()) {
    result.push({ name: g.name, keys: Array.from(new Set(g.keys)), price: g.price });
  }
  return { games: result, trash };
}

function parsePriceValue(s) {
  if (!s) return null;
  const m = s.trim().match(/^[~$€£]?\s*(\d+(?:[.,]\d+)?)/);
  if (!m) return null;
  const v = parseFloat(m[1].replace(',', '.'));
  return isNaN(v) ? null : v;
}

function addEntry(gamesMap, trashList, name, key, price) {
  if (!name || isTrash(name)) {
    trashList.push({ raw: `${name} | ${key}`, reason: isTrash(name) ? 'игра в стоп-листе' : 'имя не распознано' });
    return;
  }
  const k = name.toLowerCase().trim();
  if (!gamesMap.has(k)) gamesMap.set(k, { name, keys: [], price: null });
  const g = gamesMap.get(k);
  g.keys.push(key);
  if (price != null && g.price == null) g.price = price; // first seen price for this game
}

function normalizeForMatch(s) { return s.toLowerCase().replace(/[^a-z0-9а-я]/gi, ''); }

// ============ GIFT CARD PARSER ============
// Block-based: detects brand, nominal, currency from text per block.
// Brand/currency fall back to user-selected defaults if not found in text.

const GIFT_BRAND_PATTERNS = [
  { re: /(^|[^а-яёa-z])(steam|стим)([^а-яёa-z]|$)/i, brand: 'Steam' },
  { re: /(^|[^а-яёa-z])(google|гугл)([^а-яёa-z]|$)/i, brand: 'Google' },
  { re: /(^|[^а-яёa-z])(xbox|хбокс|guthabenkarte)([^а-яёa-z]|$)/i, brand: 'Xbox' },
  { re: /(^|[^а-яёa-z])(playstation|psn|плейстейшн|плейстешн)([^а-яёa-z]|$)/i, brand: 'PSN' },
  { re: /(^|[^а-яёa-z])(ikea|икеа|икея)([^а-яёa-z]|$)/i, brand: 'IKEA' },
  { re: /(^|[^а-яёa-z])(roblox|роблокс)([^а-яёa-z]|$)/i, brand: 'Roblox' },
  { re: /(^|[^а-яёa-z])(amazon|амазон)([^а-яёa-z]|$)/i, brand: 'Amazon' },
  { re: /(^|[^а-яёa-z])(nintendo|нинтендо|eshop)([^а-яёa-z]|$)/i, brand: 'Nintendo' },
];

const GIFT_CURRENCY_PATTERNS = [
  { re: /€|eur|евро|(^|[^а-яёa-z])(eu|еу|еур)([^а-яёa-z]|$)/i, code: 'EUR' },
  { re: /\$|usd|долл/i, code: 'USD' },
  { re: /£|gbp|фунт/i, code: 'GBP' },
  { re: /pln|zł|злот/i, code: 'PLN' },
  { re: /₽|rub|руб/i, code: 'RUB' },
  { re: /nzd/i, code: 'NZD' },
  { re: /aud/i, code: 'AUD' },
];

function detectGiftBrand(text) {
  for (const p of GIFT_BRAND_PATTERNS) if (p.re.test(text)) return p.brand;
  return null;
}
function detectGiftCurrency(text) {
  for (const p of GIFT_CURRENCY_PATTERNS) if (p.re.test(text)) return p.code;
  return null;
}

// strip label/region/noise words from a header so only brand + nominal remain
function stripGiftNoise(text) {
  let t = text;
  t = t.replace(/^[-=_*]{3,}$/gm, ' ');                       // separator lines
  t = t.replace(/\b(code|kod|voucher[a]?|кoд|wert|значение|номинал|c[oó]digo\s+del\s+vale|c[oó]digo|vale|guthaben|gift\s*card|gift|card|карта|карты|wallet|кошел[её]к|пополнение)\b\s*:?/gi, ' ');
  t = t.replace(/\bpin\b\s*:?\s*\d+/gi, ' ');                 // pin handled separately on keys
  t = t.replace(/\b(germany|deutschland|германия|global|глобал|worldwide|ww|row|eu\s*region|region\s*free|регион|europe\b)\b/gi, ' ');
  t = t.replace(/\b(de|us|uk|pl|ru|tr|br|ar)\b/gi, ' ');       // 2-letter region codes
  t = t.replace(/\b(докину|скину|докидываю|закину|остаток|сдача)\b/gi, ' '); // seller slang
  t = t.replace(/\s{2,}/g, ' ').trim();
  return t;
}

// extract all nominal numbers from a header (e.g. "30 + 10" -> [30,10])
function extractNominals(text) {
  const nums = [];
  // match numbers, but skip very long digit runs (card numbers) and 4-digit pins after "pin"
  const re = /\d+(?:[.,]\d+)?/g;
  let m;
  while ((m = re.exec(text)) !== null) {
    const raw = m[0];
    if (raw.replace(/[.,]/g, '').length >= 7) continue; // card number, not a nominal
    const val = parseFloat(raw.replace(',', '.'));
    if (!isNaN(val) && val > 0 && val < 100000) nums.push(val);
  }
  return nums;
}

// is this token/line a gift key? handles segmented keys, long alnum, pure-digit card numbers
function looksLikeGiftKey(token) {
  if (!token) return false;
  const t = token.trim();
  // reject "number + currency code" like 100PLN, 20USD, 50EUR
  if (/^\d+(eur|usd|gbp|pln|rub|nzd|aud)$/i.test(t)) return false;
  if (looksLikeKey(t)) return true;
  if (/^\d{14,22}$/.test(t)) return true; // long card number (e.g. IKEA)
  // mixed-case alphanumeric code, 10+ chars, no spaces (e.g. hsZUjJWfCyDU, UPeJwrHeEY8H)
  // real words/titles don't mix upper & lower case in the middle like this
  if (/^[A-Za-z0-9]{10,}$/.test(t) && /[a-z]/.test(t) && /[A-Z]/.test(t)) {
    // require the case to actually alternate (not just Capitalized word)
    const innerUpper = (t.slice(1).match(/[A-Z]/g) || []).length;
    if (innerUpper >= 2) return true;
  }
  return false;
}

// pull a key (and optional pin) out of a line
function extractGiftKey(line) {
  // pipe-separated: "6363426761128238224|475634" or "6363429171128238282|053908 - 50"
  const pipePin = line.match(/^(\d{14,22})\|(\d{3,8})(?:\s|$)/);
  if (pipePin) return `${pipePin[1]} pin ${pipePin[2]}`;

  // card number + pin with keyword: "6275982240603894805  pin 0109"
  const cardPin = line.match(/(\d{14,22})\s*(?:pin|пин)?\s*:?\s*(\d{3,6})?/i);
  if (cardPin && /^\s*\d{14,22}/.test(line)) {
    const card = cardPin[1];
    const pin = cardPin[2];
    return pin ? `${card} pin ${pin}` : card;
  }
  // segmented / alnum key anywhere in the line
  const tokens = line.split(/\s+/);
  for (const tok of tokens) {
    const cleaned = tok.replace(/[^A-Za-z0-9\-_]/g, '');
    if (looksLikeGiftKey(cleaned)) return cleaned;
  }
  return null;
}

function parseGiftText(raw, defaultBrand, defaultCurrency) {
  // Split into card-blocks.
  // Strategy: if the text contains voucher-label markers ("Kod vouchera:", "Voucher code:", etc.),
  // split ONLY by those markers and ignore blank lines (cards may have blank lines inside them).
  // Otherwise, fall back to splitting by blank lines.
  const VOUCHER_LABEL = /^(kod\s+vouchera|voucher\s+code|c[oó]digo\s+del\s+vale)\s*:?\s*$/i;

  const allLines = raw.split('\n')
    .map(l => l.trim())
    // drop telegram chat headers like "Nickname, [23 Jun 2026 at 13:42:49]:"
    .filter(l => !/\[\d{1,2}\s+\w+\s+\d{4}.*\]/.test(l) && !/^\S+,\s*\[.*\]:?$/.test(l))
    // drop separator lines made of dashes/equals
    .map(l => /^[-=_*]{3,}$/.test(l) ? '' : l);
  const labelCount = allLines.filter(l => VOUCHER_LABEL.test(l)).length;
  // Use label-split mode only for real voucher dumps (3+ markers). A single stray
  // label (e.g. one "Código del vale:") shouldn't override blank-line splitting.
  const hasLabels = labelCount >= 3;

  const blocks = [];
  let current = [];

  if (hasLabels) {
    // split by marker only; blank lines are ignored
    for (const line of allLines) {
      if (line === '') continue;
      if (VOUCHER_LABEL.test(line)) {
        if (current.length) { blocks.push(current); current = []; }
        continue; // drop the label line
      }
      current.push(line);
    }
    if (current.length) blocks.push(current);
  } else {
    // no markers: split by blank line(s)
    for (const line of allLines) {
      if (line === '') {
        if (current.length) { blocks.push(current); current = []; }
        continue;
      }
      current.push(line);
    }
    if (current.length) blocks.push(current);
  }

  const groups = new Map(); // brand|nominal|currency -> {brand, nominal, currency, keys[]}
  const trash = [];

  function addToGroup(brand, nominal, currency, key) {
    const k = `${normalizeForMatch(brand)}|${nominal}|${currency}`;
    if (!groups.has(k)) groups.set(k, { brand, nominal, currency, keys: [] });
    if (key) groups.get(k).keys.push(key);
  }

  for (const blockLines of blocks) {
    const headerParts = [];
    const keys = [];
    for (const line of blockLines) {
      if (/^[-=_*]{3,}$/.test(line)) continue;        // separator
      const key = extractGiftKey(line);
      // a line is "key-only" if removing the key leaves just labels/noise
      if (key) {
        const remainder = stripGiftNoise(
          line
            .replace(key.split(' pin ')[0], '')   // remove card/key part
            .replace(/\|\d{3,8}/, '')              // remove |pin (pipe format)
            .replace(/\b(pin|пин)\b\s*:?\s*\d+/i, '') // remove "pin XXXX"
        );
        if (!remainder || remainder.length < 2) { keys.push(key); continue; }
        // line has both a key and meaningful remainder (e.g. "- 50") -> key + nominal info
        keys.push(key);
        headerParts.push(remainder);
        continue;
      }
      headerParts.push(line);
    }

    const headerRaw = headerParts.join(' ');
    const cleanedHeader = stripGiftNoise(headerRaw);
    const nominals = extractNominals(cleanedHeader);
    const currency = detectGiftCurrency(headerRaw) || defaultCurrency || 'EUR';

    // Brand: 1) known brand from dictionary; 2) otherwise the leftover header text
    // (after removing the nominal number) used verbatim; 3) fallback to selected default.
    let brand = detectGiftBrand(headerRaw);
    if (!brand) {
      // strip the nominal number + currency tokens from cleaned header, keep the rest as the brand name
      let nameGuess = cleanedHeader
        .replace(/\d+(?:[.,]\d+)?/g, '')                       // remove numbers
        .replace(/€|\$|£|₽|zł/gi, '')                          // currency symbols
        .replace(/(^|[^а-яёa-z])(eur|usd|gbp|pln|rub|nzd|aud|eu|еу|еур|евро|долл)([^а-яёa-z]|$)/gi, ' ') // currency words
        .replace(/[+\-:|,.]/g, ' ')                            // leftover punctuation
        .replace(/\s{2,}/g, ' ')
        .trim();
      // if nothing meaningful is left (e.g. only slang/punctuation was there), use default
      brand = nameGuess.length >= 2 ? nameGuess : (defaultBrand || 'Gift');
    }

    if (nominals.length === 0) {
      // keys but no nominal -> orphan (hard case, needs manual)
      for (const key of keys) trash.push({ raw: key, reason: 'ключ без номинала — добавь вручную' });
      if (keys.length === 0 && headerRaw) trash.push({ raw: headerRaw, reason: 'не распознано' });
      continue;
    }

    if (nominals.length === 1) {
      // always create group (even if no keys yet) — post-processing will match orphan keys
      if (keys.length === 0) {
        addToGroup(brand, nominals[0], currency, null); // empty group, may get keys from post-processing
      } else {
        for (const key of keys) addToGroup(brand, nominals[0], currency, key);
      }
      continue;
    }

    // multiple nominals (e.g. "30 + 10"): positional split if key count matches
    if (nominals.length === keys.length) {
      nominals.forEach((nom, i) => addToGroup(brand, nom, currency, keys[i]));
    } else {
      nominals.forEach((nom) => addToGroup(brand, nom, currency, null));
      for (const key of keys) addToGroup(brand, nominals[0], currency, key);
      trash.push({ raw: `${brand} ${nominals.join(' + ')} ${currency} (${keys.length} ключей)`, reason: 'несколько номиналов — проверь распределение ключей вручную' });
    }
  }

  // Post-processing: link orphan keys to empty nominal groups.
  // Handles format: "Kod vouchera:\nKEY\n\nBrand 200PLN" (key and nominal in separate blocks)
  const stillOrphan = [];
  const pendingOrphanKeys = [];
  for (const t of trash) {
    if (t.reason === 'ключ без номинала — добавь вручную') {
      pendingOrphanKeys.push(t.raw);
    } else {
      stillOrphan.push(t);
    }
  }

  if (pendingOrphanKeys.length > 0) {
    const emptyGroups = Array.from(groups.values()).filter(g => g.keys.length === 0);
    if (emptyGroups.length > 0) {
      if (pendingOrphanKeys.length === emptyGroups.length) {
        // one-to-one match by position
        emptyGroups.forEach((g, i) => g.keys.push(pendingOrphanKeys[i]));
      } else {
        // best effort: assign all to first empty group
        emptyGroups[0].keys.push(...pendingOrphanKeys);
      }
    } else {
      for (const k of pendingOrphanKeys) stillOrphan.push({ raw: k, reason: 'ключ без номинала — добавь вручную' });
    }
  }

  // empty groups that still have no keys → trash as "nominal without key"
  for (const g of groups.values()) {
    if (g.keys.length === 0) {
      stillOrphan.push({ raw: `${g.brand} ${g.nominal} ${g.currency}`, reason: 'номинал без ключа — добавь ключ вручную' });
    }
  }
  trash.splice(0, trash.length, ...stillOrphan);

  const result = [];
  for (const g of groups.values()) {
    if (g.keys.length === 0) continue;
    result.push({ ...g, keys: Array.from(new Set(g.keys)) });
  }
  result.sort((a, b) => (a.brand + a.nominal).localeCompare(b.brand + b.nominal) || a.nominal - b.nominal);
  return { groups: result, trash };
}

function findExistingGame(dbGames, name) {
  const norm = normalizeForMatch(name);
  for (const g of dbGames) if (normalizeForMatch(g.name) === norm) return g;
  for (const g of dbGames) {
    const gn = normalizeForMatch(g.name);
    if (gn.length > 4 && (gn.includes(norm) || norm.includes(gn)) && Math.abs(gn.length - norm.length) < 6) return g;
  }
  return null;
}

// ============ STORAGE HELPERS ============
// Universal storage layer:
//  - On a real website (GitHub Pages / browser) uses localStorage → данные живут на устройстве
//    между любыми открытиями, обновлять базу каждый раз не нужно.
//  - Внутри артефакта Claude (где localStorage недоступен) откатывается на window.storage.
const hasLocalStorage = (() => {
  try {
    const k = '__keyhub_test__';
    window.localStorage.setItem(k, '1');
    window.localStorage.removeItem(k);
    return true;
  } catch { return false; }
})();

async function storageGet(key) {
  if (hasLocalStorage) {
    const v = window.localStorage.getItem(key);
    return v === null ? null : { value: v };
  }
  try { return await window.storage.get(key); } catch { return null; }
}
async function storageSet(key, value) {
  if (hasLocalStorage) { window.localStorage.setItem(key, value); return; }
  try { await window.storage.set(key, value); } catch (e) { console.error(e); }
}

// DB stores ONLY name -> price, no keys
async function loadDB() {
  try { const res = await storageGet('price-db'); return res ? JSON.parse(res.value) : []; } catch { return []; }
}
async function saveDB(games) { try { await storageSet('price-db', JSON.stringify(games)); } catch (e) { console.error(e); } }

async function loadSuppliers() {
  try { const res = await storageGet('suppliers'); return res ? JSON.parse(res.value) : []; } catch { return []; }
}
async function saveSuppliers(list) { try { await storageSet('suppliers', JSON.stringify(list)); } catch (e) { console.error(e); } }

async function loadGGKey() { try { const res = await storageGet('ggdeals-key'); return res ? res.value : ''; } catch { return ''; } }
async function saveGGKey(key) { try { await storageSet('ggdeals-key', key); } catch (e) { console.error(e); } }

// Parse pasted gg.deals prices in format "Game Name = 6.78" (one per line)
function parseGGPriceText(raw) {
  const lines = raw.split('\n').map(l => l.trim()).filter(Boolean);
  const result = [];
  for (const line of lines) {
    let m = line.match(/^(.*?)\s*[=:]\s*\$?\s*([\d]+(?:[.,]\d+)?)\s*$/);
    if (!m) m = line.match(/^(.*?)\s+\$?([\d]+(?:[.,]\d+)?)\s*$/);
    if (m) {
      const name = m[1].trim();
      const price = parseFloat(m[2].replace(',', '.'));
      if (name && !isNaN(price)) result.push({ name, price });
    }
  }
  return result;
}

// Find Steam App ID by game name via Steam store search (browser fetch; may hit CORS)
async function findSteamAppId(name) {
  const url = `https://store.steampowered.com/api/storesearch/?term=${encodeURIComponent(name)}&l=english&cc=us`;
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Steam search HTTP ${res.status}`);
  const data = await res.json();
  if (data && Array.isArray(data.items) && data.items.length > 0) {
    return { id: data.items[0].id, matchedName: data.items[0].name };
  }
  return null;
}

// Fetch gg.deals keyshop prices by Steam App IDs (batch up to 100), region us => USD
async function fetchGGPrices(appIds, key) {
  const ids = appIds.join(',');
  const url = `https://api.gg.deals/v1/prices/by-steam-app-id/?ids=${ids}&key=${encodeURIComponent(key)}&region=us`;
  const res = await fetch(url);
  if (!res.ok) {
    if (res.status === 429) throw new Error('Превышен лимит запросов gg.deals (100/мин). Подожди минуту.');
    throw new Error(`gg.deals HTTP ${res.status}`);
  }
  const data = await res.json();
  if (!data.success) throw new Error('gg.deals вернул ошибку');
  return data.data; // { appId: {title, url, prices:{currentKeyshops, currency,...}} | null }
}

const CURRENCIES = ['USD', 'EUR', 'NZD', 'AUD', 'RUB', 'GBP'];

function KeyHub() {
  const [view, setView] = useState('intake'); // intake | review | db | giftIntake | giftReview | suppliers
  const [dbGames, setDbGames] = useState([]);
  const [loading, setLoading] = useState(true);
  const [rawText, setRawText] = useState('');
  const [parseResult, setParseResult] = useState(null);
  const [dbSearch, setDbSearch] = useState('');
  const [toast, setToast] = useState(null);

  const [giftRawText, setGiftRawText] = useState('');
  const [giftParseResult, setGiftParseResult] = useState(null);
  const [giftPercent, setGiftPercent] = useState('');
  const [giftBrand, setGiftBrand] = useState('Steam');
  const [giftCurrency, setGiftCurrency] = useState('EUR');
  const [giftRate, setGiftRate] = useState(''); // exchange rate: 1 giftCurrency = ? USD
  const [giftRateLoading, setGiftRateLoading] = useState(false);

  const [ggKey, setGgKey] = useState('');
  const [suppliers, setSuppliers] = useState([]);
  const [selectedSupplier, setSelectedSupplier] = useState('');
  const [ggUpdating, setGgUpdating] = useState(false);
  const [ggProgress, setGgProgress] = useState(null); // {done, total} or null

  const GIFT_BRANDS = ['Steam', 'Roblox', 'PSN', 'Xbox', 'Nintendo', 'IKEA', 'Other'];
  const GIFT_CURRENCIES = ['USD', 'EUR', 'GBP', 'PLN', 'NZD', 'AUD', 'RUB'];
  const DEFAULT_RATES = { USD: 1, EUR: 1.15, GBP: 1.33, NZD: 0.61, AUD: 0.65, RUB: 0.0103 };

  async function fetchExchangeRate(cur) {
    if (cur === 'USD') { setGiftRate('1'); return; }
    setGiftRateLoading(true);
    try {
      const res = await fetch(`https://api.frankfurter.dev/v1/latest?base=${cur}&symbols=USD`);
      const data = await res.json();
      if (data?.rates?.USD) {
        setGiftRate(String(data.rates.USD));
      } else {
        setGiftRate(String(DEFAULT_RATES[cur] || 1));
      }
    } catch {
      setGiftRate(String(DEFAULT_RATES[cur] || 1));
    }
    setGiftRateLoading(false);
  }

  useEffect(() => { fetchExchangeRate(giftCurrency); }, [giftCurrency]);

  useEffect(() => {
    (async () => {
      const [g, key, sups] = await Promise.all([loadDB(), loadGGKey(), loadSuppliers()]);
      setDbGames(g); setGgKey(key); setSuppliers(sups); setLoading(false);
    })();
  }, []);

  function showToast(msg, type = 'info') { setToast({ msg, type }); setTimeout(() => setToast(null), 2800); }
  async function persistGames(games) { setDbGames(games); await saveDB(games); }

  async function addSupplier(name) {
    const trimmed = name.trim();
    if (!trimmed) return;
    if (suppliers.includes(trimmed)) { showToast('Поставщик уже есть в базе', 'info'); return; }
    const updated = [...suppliers, trimmed].sort((a, b) => a.localeCompare(b));
    setSuppliers(updated);
    await saveSuppliers(updated);
    showToast(`Добавлен: ${trimmed}`, 'success');
  }

  async function removeSupplier(name) {
    const updated = suppliers.filter(s => s !== name);
    setSuppliers(updated);
    await saveSuppliers(updated);
    if (selectedSupplier === name) setSelectedSupplier('');
  }

  function handleParse() {
    if (!rawText.trim()) return;
    const { games, trash } = parseSupplierText(rawText);
    const matched = [];
    const fresh = [];
    for (const g of games) {
      const textPrice = (g.price != null) ? String(g.price) : '';
      const existing = findExistingGame(dbGames, g.name);
      if (existing) {
        // prefer the price from the pasted text if present, else keep existing DB price
        matched.push({ ...g, existingId: existing.id, existingName: existing.name, costPrice: textPrice !== '' ? textPrice : existing.costPrice, currency: existing.currency, ggKeyshop: existing.ggKeyshop || null, ggCurrency: existing.ggCurrency || 'USD' });
      } else {
        fresh.push({ ...g, costPrice: textPrice, currency: 'USD' });
      }
    }
    setParseResult({ matched, newGames: fresh, trash });
    setView('review');
  }

  function updateNewGameField(idx, field, value) {
    setParseResult(prev => {
      const copy = { ...prev, newGames: [...prev.newGames] };
      copy.newGames[idx] = { ...copy.newGames[idx], [field]: value };
      return copy;
    });
  }

  function updateMatchedField(idx, field, value) {
    setParseResult(prev => {
      const copy = { ...prev, matched: [...prev.matched] };
      copy.matched[idx] = { ...copy.matched[idx], [field]: value };
      return copy;
    });
  }

  async function confirmImport() {
    if (!parseResult) return;
    const missing = parseResult.newGames.filter(g => g.costPrice === '' || isNaN(parseFloat(g.costPrice)));
    if (missing.length > 0) { showToast(`Укажи цену закупки для всех новых игр (${missing.length} без цены)`, 'error'); return; }

    let games = [...dbGames];
    const now = new Date().toISOString();

    // matched games: nothing to merge (no keys stored), but allow price was possibly edited
    for (const m of parseResult.matched) {
      const idx = games.findIndex(g => g.id === m.existingId);
      if (idx === -1) continue;
      games[idx] = { ...games[idx], costPrice: m.costPrice, currency: m.currency, updatedAt: now };
    }

    for (const ng of parseResult.newGames) {
      // guard: skip if this name was already just written in this same batch (handles double-submit)
      if (findExistingGame(games, ng.name)) continue;
      const id = 'g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8);
      games.push({ id, name: ng.name, costPrice: parseFloat(ng.costPrice), currency: ng.currency, createdAt: now, updatedAt: now });
    }

    await persistGames(games);
    showToast('Цены сохранены в базе', 'success');
    setParseResult(null);
    setRawText('');
    setView('intake');
  }

  function cancelReview() { setParseResult(null); setView('intake'); setRawText(''); }

  // ============ GIFT CARD LOGIC (no DB - single percent applies to whole batch) ============
  function handleGiftParse() {
    if (!giftRawText.trim()) return;
    const { groups, trash } = parseGiftText(giftRawText, giftBrand, giftCurrency);
    setGiftParseResult({ groups, trash });
    setView('giftReview');
  }

  function cancelGiftReview() { setGiftParseResult(null); setGiftPercent(''); setView('giftIntake'); setGiftRawText(''); }

  // price per key: nominal × percent / 100 → convert to USD → floor to tenths
  function giftCostUSD(nominal) {
    const p = parseFloat(giftPercent);
    const r = parseFloat(giftRate);
    if (isNaN(p) || isNaN(r) || r === 0) return null;
    const costInCurrency = nominal * p / 100;
    const costInUSD = costInCurrency * r;
    return Math.floor(costInUSD * 10) / 10;
  }

  const giftGroupedText = useMemo(() => {
    if (!giftParseResult) return '';
    const lines = [];
    for (const g of giftParseResult.groups) {
      const cost = giftCostUSD(g.nominal);
      const costLabel = cost !== null ? ` — ${cost.toFixed(1)} USD` : '';
      lines.push(`${g.brand} ${g.nominal} ${g.currency}${costLabel}`);
      for (const k of g.keys) lines.push(k);
      lines.push('');
    }
    return lines.join('\n').trim();
  }, [giftParseResult, giftPercent, giftRate, giftBrand, giftCurrency]);

  const giftImportPayout = useMemo(() => {
    if (!giftParseResult) return null;
    if (giftCostUSD(1) === null) return null;
    let totalKeys = 0;
    let totalUSD = 0;
    const lines = [];
    for (const g of giftParseResult.groups) {
      const costPerKey = giftCostUSD(g.nominal);
      const lineTotal = costPerKey * g.keys.length;
      totalUSD += lineTotal;
      totalKeys += g.keys.length;
      lines.push({ name: `${g.brand} ${g.nominal} ${g.currency}`, qty: g.keys.length, costPerKey, lineTotal });
    }
    lines.sort((a, b) => b.lineTotal - a.lineTotal);
    return { totalUSD, totalKeys, lines };
  }, [giftParseResult, giftPercent, giftRate, giftBrand, giftCurrency]);

  function copyGiftGroupedText() {
    navigator.clipboard?.writeText(giftGroupedText);
    showToast('Текст скопирован', 'success');
  }

  // grouped text output: all games from this import, deduped keys, as plain text
  const groupedText = useMemo(() => {
    if (!parseResult) return '';
    const lines = [];
    for (const m of parseResult.matched) {
      const priceLabel = m.costPrice !== '' && !isNaN(parseFloat(m.costPrice)) ? ` — ${m.costPrice} ${m.currency}` : '';
      lines.push(`${m.existingName}${priceLabel}`);
      for (const k of m.keys) lines.push(k);
      lines.push('');
    }
    for (const ng of parseResult.newGames) {
      const priceLabel = ng.costPrice !== '' && !isNaN(parseFloat(ng.costPrice)) ? ` — ${ng.costPrice} ${ng.currency}` : '';
      lines.push(`${ng.name}${priceLabel}`);
      for (const k of ng.keys) lines.push(k);
      lines.push('');
    }
    let text = lines.join('\n').trim();
    if (selectedSupplier) text += `\n\n${selectedSupplier}`;
    return text;
  }, [parseResult, selectedSupplier]);

  // payout total for THIS import only
  const importPayout = useMemo(() => {
    if (!parseResult) return null;
    const byCurrency = {};
    let totalKeys = 0;
    const lines = [];
    for (const g of [...parseResult.matched, ...parseResult.newGames]) {
      const cost = parseFloat(g.costPrice);
      const cur = g.currency || 'USD';
      if (isNaN(cost)) continue;
      const lineTotal = cost * g.keys.length;
      byCurrency[cur] = (byCurrency[cur] || 0) + lineTotal;
      totalKeys += g.keys.length;
      lines.push({ name: g.existingName || g.name, qty: g.keys.length, unitCost: cost, currency: cur, lineTotal });
    }
    lines.sort((a, b) => b.lineTotal - a.lineTotal);
    return { byCurrency, totalKeys, lines };
  }, [parseResult]);

  function copyGroupedText() {
    navigator.clipboard?.writeText(groupedText);
    showToast('Текст скопирован', 'success');
  }

  const filteredDbGames = useMemo(() => {
    const q = dbSearch.toLowerCase().trim();
    let list = [...dbGames];
    if (q) list = list.filter(g => g.name.toLowerCase().includes(q));
    return list.sort((a, b) => a.name.localeCompare(b.name));
  }, [dbGames, dbSearch]);

  async function updateGamePrice(id, field, value) {
    const games = dbGames.map(g => g.id === id ? { ...g, [field]: value, updatedAt: new Date().toISOString() } : g);
    await persistGames(games);
  }
  async function deleteGame(id) { await persistGames(dbGames.filter(g => g.id !== id)); showToast('Игра удалена из базы', 'info'); }

  async function mergeDuplicates() {
    const seen = new Map(); // normalizedName -> kept game
    const result = [];
    let mergedCount = 0;
    for (const g of dbGames) {
      const key = normalizeForMatch(g.name);
      if (seen.has(key)) {
        mergedCount++;
        continue; // drop duplicate, keep the first occurrence's price
      }
      seen.set(key, g);
      result.push(g);
    }
    if (mergedCount === 0) { showToast('Дубликатов не найдено', 'info'); return; }
    await persistGames(result);
    showToast(`Объединено ${mergedCount} дублей`, 'success');
  }

  // ============ GG.DEALS PRICE UPDATE ============
  async function saveGGKeyHandler(key) {
    setGgKey(key);
    await saveGGKey(key);
  }

  async function updateGGPrices() {
    if (!ggKey.trim()) { showToast('Сначала впиши API-ключ gg.deals', 'error'); return; }
    if (dbGames.length === 0) { showToast('База пуста', 'info'); return; }

    setGgUpdating(true);
    setGgProgress({ done: 0, total: dbGames.length });

    let games = [...dbGames];
    const now = new Date().toISOString();
    let appIdErrors = 0;
    let firstError = null;

    // Step 1: resolve Steam App IDs for games that don't have one yet
    for (let i = 0; i < games.length; i++) {
      if (!games[i].steamAppId) {
        try {
          const found = await findSteamAppId(games[i].name);
          if (found) {
            games[i] = { ...games[i], steamAppId: found.id, steamMatchedName: found.matchedName };
          } else {
            appIdErrors++;
          }
        } catch (e) {
          appIdErrors++;
          if (!firstError) firstError = e.message;
        }
      }
      setGgProgress({ done: i + 1, total: games.length });
    }

    // persist any newly found app ids
    await persistGames(games);

    // Step 2: batch query gg.deals for keyshop prices (chunks of 100)
    const withIds = games.filter(g => g.steamAppId);
    if (withIds.length === 0) {
      setGgUpdating(false); setGgProgress(null);
      const msg = firstError
        ? `Не удалось найти App ID. Похоже на блокировку запросов (CORS): ${firstError}`
        : 'Не удалось определить ни одного Steam App ID по названиям';
      showToast(msg, 'error');
      return;
    }

    try {
      for (let start = 0; start < withIds.length; start += 100) {
        const chunk = withIds.slice(start, start + 100);
        const priceData = await fetchGGPrices(chunk.map(g => g.steamAppId), ggKey.trim());
        for (const g of chunk) {
          const entry = priceData[String(g.steamAppId)];
          const idx = games.findIndex(x => x.id === g.id);
          if (idx === -1) continue;
          if (entry && entry.prices) {
            games[idx] = {
              ...games[idx],
              ggKeyshop: entry.prices.currentKeyshops || null,
              ggCurrency: entry.prices.currency || 'USD',
              ggTitle: entry.title || null,
              ggUrl: entry.url || null,
              ggUpdatedAt: now,
            };
          } else {
            games[idx] = { ...games[idx], ggKeyshop: null, ggUpdatedAt: now };
          }
        }
      }
      await persistGames(games);
      const okCount = games.filter(g => g.ggKeyshop).length;
      let msg = `Обновлено: ${okCount} цен с gg.deals`;
      if (appIdErrors > 0) msg += ` · ${appIdErrors} игр без App ID`;
      showToast(msg, 'success');
    } catch (e) {
      await persistGames(games);
      showToast(`Ошибка gg.deals: ${e.message}. Возможна блокировка CORS из браузера.`, 'error');
    }

    setGgUpdating(false);
    setGgProgress(null);
  }

  async function syncGGToCost(id) {
    const g = dbGames.find(x => x.id === id);
    if (!g || !g.ggKeyshop) { showToast('Нет цены gg.deals для синхронизации', 'error'); return; }
    const price = parseFloat(g.ggKeyshop);
    if (isNaN(price)) { showToast('Цена gg.deals некорректна', 'error'); return; }
    const games = dbGames.map(x => x.id === id ? { ...x, costPrice: price, currency: g.ggCurrency || 'USD', updatedAt: new Date().toISOString() } : x);
    await persistGames(games);
    showToast(`Цена синхронизирована: ${price} ${g.ggCurrency || 'USD'}`, 'success');
  }

  // ============ PROXY-BASED GG.DEALS FETCH (selected games only) ============
  // Routes Steam search + gg.deals API through a public CORS proxy.
  // Unreliable by nature; falls back to clear error so user can use the copy→paste flow.
  async function fetchGGForSelected(ids) {
    if (!ids || ids.length === 0) { showToast('Сначала отметь игры галочками', 'error'); return; }
    if (!ggKey.trim()) { showToast('Для авто-режима нужен API-ключ gg.deals (впиши его ниже или используй копирование)', 'error'); return; }

    const PROXY = 'https://api.allorigins.win/raw?url=';
    const wrap = (u) => PROXY + encodeURIComponent(u);

    setGgUpdating(true);
    setGgProgress({ done: 0, total: ids.length });
    let games = [...dbGames];
    const now = new Date().toISOString();
    let ok = 0, failed = 0, firstErr = null;

    for (let i = 0; i < ids.length; i++) {
      const idx = games.findIndex(g => g.id === ids[i]);
      if (idx === -1) { setGgProgress({ done: i + 1, total: ids.length }); continue; }
      const game = games[idx];
      try {
        let appId = game.steamAppId;
        if (!appId) {
          const sres = await fetch(wrap(`https://store.steampowered.com/api/storesearch/?term=${encodeURIComponent(game.name)}&l=english&cc=us`));
          const sdata = await sres.json();
          if (sdata && sdata.items && sdata.items.length) appId = sdata.items[0].id;
        }
        if (!appId) { failed++; setGgProgress({ done: i + 1, total: ids.length }); continue; }
        const pres = await fetch(wrap(`https://api.gg.deals/v1/prices/by-steam-app-id/?ids=${appId}&key=${encodeURIComponent(ggKey.trim())}&region=us`));
        const pdata = await pres.json();
        const entry = pdata && pdata.data ? pdata.data[String(appId)] : null;
        if (entry && entry.prices && entry.prices.currentKeyshops) {
          games[idx] = { ...game, steamAppId: appId, ggKeyshop: entry.prices.currentKeyshops, ggCurrency: entry.prices.currency || 'USD', ggUpdatedAt: now };
          ok++;
        } else { failed++; }
      } catch (e) {
        failed++;
        if (!firstErr) firstErr = e.message;
      }
      setGgProgress({ done: i + 1, total: ids.length });
    }

    await persistGames(games);
    setGgUpdating(false);
    setGgProgress(null);
    if (ok === 0) {
      showToast(`Авто не сработало (${firstErr || 'прокси/CORS'}). Используй «Цены на выбранные» и пришли Клоду.`, 'error');
    } else {
      showToast(`Авто: получено ${ok} цен${failed ? `, не вышло ${failed}` : ''}`, 'success');
    }
  }

  // ============ EXPORT / IMPORT DB ============
  function exportDB() {
    const payload = { version: 2, exportedAt: new Date().toISOString(), games: dbGames, suppliers };
    const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `keyhub_backup_${new Date().toISOString().slice(0, 10)}.json`;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast(`Экспорт: ${dbGames.length} игр, ${suppliers.length} поставщиков`, 'success');
  }

  async function importDB(file) {
    try {
      const text = await file.text();
      const parsed = JSON.parse(text);
      // games: support both old format (bare array) and new ({version, games, suppliers})
      const incoming = Array.isArray(parsed) ? parsed : parsed.games;
      const incomingSuppliers = Array.isArray(parsed) ? [] : (parsed.suppliers || []);
      if (!Array.isArray(incoming)) { showToast('Файл не похож на базу KeyHub', 'error'); return; }

      // merge games by normalized name: keep current, add new, imported wins for matching
      let games = [...dbGames];
      let added = 0, updated = 0;
      for (const imp of incoming) {
        if (!imp || !imp.name) continue;
        const idx = games.findIndex(g => normalizeForMatch(g.name) === normalizeForMatch(imp.name));
        if (idx === -1) {
          const id = imp.id || ('g_' + Date.now() + '_' + Math.random().toString(36).slice(2, 8));
          games.push({ ...imp, id });
          added++;
        } else {
          games[idx] = { ...games[idx], ...imp, id: games[idx].id };
          updated++;
        }
      }
      await persistGames(games);

      // merge suppliers: union, dedupe, keep sorted
      let supAdded = 0;
      if (incomingSuppliers.length > 0) {
        const set = new Set(suppliers);
        for (const s of incomingSuppliers) {
          const name = String(s).trim();
          if (name && !set.has(name)) { set.add(name); supAdded++; }
        }
        const mergedSuppliers = Array.from(set).sort((a, b) => a.localeCompare(b));
        setSuppliers(mergedSuppliers);
        await saveSuppliers(mergedSuppliers);
      }

      let msg = `Импорт: +${added} игр, ${updated} обновлено`;
      if (supAdded > 0) msg += ` · +${supAdded} поставщиков`;
      showToast(msg, 'success');
    } catch (e) {
      showToast(`Ошибка импорта: ${e.message}`, 'error');
    }
  }

  // ============ PASTE PRICES (manual gg.deals workaround) ============
  // Parses lines like "Game Name — 5.20", "Game Name | 5.20 USD", "Game Name : 5.2"
  // Apply gg.deals prices pasted as text (matched to games by name)
  async function applyGGPriceText(text) {
    const parsed = parseGGPriceText(text);
    if (parsed.length === 0) { showToast('Не удалось разобрать ни одной строки. Формат: Название = 6.78', 'error'); return; }
    const now = new Date().toISOString();
    let games = [...dbGames];
    let matchedCount = 0;
    const unmatched = [];
    for (const p of parsed) {
      const existing = findExistingGame(games, p.name);
      if (existing) {
        const idx = games.findIndex(x => x.id === existing.id);
        games[idx] = { ...games[idx], ggKeyshop: p.price, ggCurrency: 'USD', ggUpdatedAt: now };
        matchedCount++;
      } else {
        unmatched.push(p.name);
      }
    }
    await persistGames(games);
    let msg = `Заполнено ${matchedCount} цен`;
    if (unmatched.length > 0) msg += ` · не найдено в базе: ${unmatched.length}`;
    showToast(msg, unmatched.length > 0 ? 'info' : 'success');
  }

  const appRef = useRef(null);
  const [windowWidth, setWindowWidth] = useState(380); // default to mobile until measured
  useEffect(() => {
    if (!appRef.current) return;
    const ro = new ResizeObserver(entries => {
      for (const e of entries) setWindowWidth(e.contentRect.width);
    });
    ro.observe(appRef.current);
    // also measure immediately
    setWindowWidth(appRef.current.offsetWidth);
    return () => ro.disconnect();
  }, []);
  const mobile = windowWidth < 600;

  return (
    <MobileCtx.Provider value={mobile}>
    <div ref={appRef} style={{ ...styles.app, flexDirection: mobile ? 'column' : 'row' }}>
      <style>{globalCss}</style>

      {/* Desktop sidebar */}
      {!mobile && (
        <div style={styles.sidebar}>
          <div style={styles.logo}><Package size={20} color="#ff6b4a" /><span style={{ fontWeight: 700, fontSize: 15 }}>KeyHub</span></div>
          <nav style={styles.nav}>
            <NavItem icon={<Plus size={16} />} label="Импорт игр" active={view === 'intake' || view === 'review'} onClick={() => { setView('intake'); }} />
            <NavItem icon={<Search size={16} />} label="База цен игр" active={view === 'db'} onClick={() => setView('db')} badge={dbGames.length} />
            <div style={styles.navDivider} />
            <NavItem icon={<Gift size={16} />} label="Гифты" active={view === 'giftIntake' || view === 'giftReview'} onClick={() => setView('giftIntake')} />
            <NavItem icon={<Users size={16} />} label="Поставщики" active={view === 'suppliers'} onClick={() => setView('suppliers')} badge={suppliers.length || undefined} />
          </nav>
        </div>
      )}

      {/* Mobile top bar */}
      {mobile && (
        <div style={styles.mobileTopBar}>
          <Package size={18} color="#ff6b4a" />
          <span style={{ fontWeight: 700, fontSize: 16, color: '#fff' }}>KeyHub</span>
        </div>
      )}

      <div style={mobile ? styles.mainMobile : styles.main}>
        {toast && (
          <div style={{ ...styles.toast, borderColor: toast.type === 'error' ? '#ef4444' : toast.type === 'success' ? '#4ade80' : '#374151' }}>
            {toast.type === 'success' && <Check size={14} color="#4ade80" />}
            {toast.type === 'error' && <AlertCircle size={14} color="#ef4444" />}
            <span>{toast.msg}</span>
          </div>
        )}

        {view === 'intake' && (
          <IntakeView rawText={rawText} setRawText={setRawText} handleParse={handleParse} />
        )}

        {view === 'review' && parseResult && (
          <ReviewView
            parseResult={parseResult}
            updateNewGameField={updateNewGameField}
            updateMatchedField={updateMatchedField}
            confirmImport={confirmImport}
            cancelReview={cancelReview}
            groupedText={groupedText}
            copyGroupedText={copyGroupedText}
            importPayout={importPayout}
            suppliers={suppliers}
            selectedSupplier={selectedSupplier}
            setSelectedSupplier={setSelectedSupplier}
            addSupplier={addSupplier}
            removeSupplier={removeSupplier}
          />
        )}

        {view === 'db' && (
          <DbView
            games={filteredDbGames} search={dbSearch} setSearch={setDbSearch}
            updateGamePrice={updateGamePrice} deleteGame={deleteGame} allCount={dbGames.length}
            mergeDuplicates={mergeDuplicates}
            ggKey={ggKey} saveGGKeyHandler={saveGGKeyHandler}
            updateGGPrices={updateGGPrices} ggUpdating={ggUpdating} ggProgress={ggProgress}
            syncGGToCost={syncGGToCost}
            applyGGPriceText={applyGGPriceText}
            allGames={dbGames}
            showToast={showToast}
            exportDB={exportDB}
            importDB={importDB}
            fetchGGForSelected={fetchGGForSelected}
          />
        )}

        {view === 'giftIntake' && (
          <GiftIntakeView
            giftRawText={giftRawText} setGiftRawText={setGiftRawText} handleGiftParse={handleGiftParse}
            giftBrand={giftBrand} setGiftBrand={setGiftBrand} GIFT_BRANDS={GIFT_BRANDS}
            giftCurrency={giftCurrency} setGiftCurrency={setGiftCurrency} GIFT_CURRENCIES={GIFT_CURRENCIES}
          />
        )}

        {view === 'giftReview' && giftParseResult && (
          <GiftReviewView
            giftParseResult={giftParseResult}
            giftPercent={giftPercent} setGiftPercent={setGiftPercent}
            giftBrand={giftBrand} giftCurrency={giftCurrency}
            giftRate={giftRate} setGiftRate={setGiftRate} giftRateLoading={giftRateLoading}
            cancelGiftReview={cancelGiftReview}
            giftGroupedText={giftGroupedText} copyGiftGroupedText={copyGiftGroupedText}
            giftImportPayout={giftImportPayout}
            giftCostUSD={giftCostUSD}
          />
        )}

        {view === 'suppliers' && (
          <SuppliersView
            suppliers={suppliers}
            addSupplier={addSupplier}
            removeSupplier={removeSupplier}
          />
        )}
      </div>

      {/* Mobile bottom tab bar */}
      {mobile && (
        <div style={styles.mobileTabBar}>
          <button
            onClick={() => setView('intake')}
            style={{ ...styles.mobileTab, ...(view === 'intake' || view === 'review' ? styles.mobileTabActive : {}) }}
          >
            <Plus size={22} />
            <span>Импорт</span>
          </button>
          <button
            onClick={() => setView('db')}
            style={{ ...styles.mobileTab, ...(view === 'db' ? styles.mobileTabActive : {}) }}
          >
            <Search size={22} />
            <span>База{dbGames.length > 0 ? ` (${dbGames.length})` : ''}</span>
          </button>
          <button
            onClick={() => setView('giftIntake')}
            style={{ ...styles.mobileTab, ...(view === 'giftIntake' || view === 'giftReview' ? styles.mobileTabActive : {}) }}
          >
            <Gift size={22} />
            <span>Гифты</span>
          </button>
          <button
            onClick={() => setView('suppliers')}
            style={{ ...styles.mobileTab, ...(view === 'suppliers' ? styles.mobileTabActive : {}) }}
          >
            <Users size={22} />
            <span>Поставщики</span>
          </button>
        </div>
      )}
    </div>
    </MobileCtx.Provider>
  );
}

            <Users size={15} color="#a78bfa" style={{ flexShrink: 0 }} />
            <span style={{ flex: 1, fontWeight: 600, fontSize: 14 }}>{s}</span>

      {/* Supplier selector */}
      <div style={styles.ggPanel}>
        <div style={{ fontSize: 12.5, color: '#d1d5db', fontWeight: 600, marginBottom: 10 }}>Поставщик</div>
        <div style={{ display: 'flex', gap: 8, alignItems: 'center', flexWrap: 'wrap' }}>
          <div style={{ position: 'relative', flex: 1, minWidth: 180 }}>
            <input
              value={supplierSearch}
              onChange={e => { setSupplierSearch(e.target.value); setShowSupplierList(true); }}
              onFocus={() => setShowSupplierList(true)}
              placeholder={selectedSupplier || 'Поиск или добавить нового…'}
              style={{ ...styles.inputSmall, width: '100%', fontSize: 13 }}
            />
            {showSupplierList && (supplierSearch || suppliers.length > 0) && (
              <div style={{ position: 'absolute', top: '100%', left: 0, right: 0, background: '#1a1a22', border: '1px solid #2d2d35', borderRadius: 8, zIndex: 50, maxHeight: 180, overflowY: 'auto', marginTop: 4 }}>
                {filteredSuppliers.map(s => (
                  <div key={s} style={{ display: 'flex', alignItems: 'center', padding: '8px 12px', cursor: 'pointer', background: selectedSupplier === s ? '#2d2050' : 'transparent', borderBottom: '1px solid #232329' }}
                    onClick={() => { setSelectedSupplier(s); setSupplierSearch(''); setShowSupplierList(false); }}>
                    <span style={{ flex: 1, fontSize: 13, color: selectedSupplier === s ? '#a78bfa' : '#e5e7eb' }}>{s}</span>
                    <button onClick={e => { e.stopPropagation(); removeSupplier(s); }} style={{ background: 'none', border: 'none', color: '#6b7280', cursor: 'pointer', padding: '0 4px', fontSize: 14 }}>×</button>
                  </div>
                ))}
                {supplierSearch && !suppliers.includes(supplierSearch.trim()) && (
                  <div style={{ padding: '8px 12px', cursor: 'pointer', color: '#a78bfa', fontSize: 13, borderTop: filteredSuppliers.length ? '1px solid #2d2d35' : 'none' }}

                    + Добавить «{supplierSearch.trim()}»

          {selectedSupplier && (
            <div style={{ display: 'flex', alignItems: 'center', gap: 6, background: '#2d2050', border: '1px solid #a78bfa55', borderRadius: 8, padding: '6px 12px' }}>
              <span style={{ fontSize: 13, color: '#a78bfa', fontWeight: 600 }}>{selectedSupplier}</span>
              <button onClick={() => setSelectedSupplier('')} style={{ background: 'none', border: 'none', color: '#6b7280', cursor: 'pointer', fontSize: 16, lineHeight: 1 }}>×</button>
            </div>

        {!selectedSupplier && <div style={{ fontSize: 11, color: '#6b7280', marginTop: 8 }}>Нік постачальника буде додано в кінець тексту з ключами</div>}
      </div>

      <div style={{ display: 'flex', gap: 10, marginBottom: 26 }}>
        <button onClick={confirmImport} style={styles.btnPrimaryLg}><Check size={16} /> Сохранить цены в базу</button>

        </div>
        <textarea readOnly value={groupedText} style={{ ...styles.textarea, fontSize: 12 }} rows={14} onClick={e => e.target.select()} />

  );
}

function DbView({ games, search, setSearch, updateGamePrice, deleteGame, allCount, mergeDuplicates, ggKey, saveGGKeyHandler, updateGGPrices, ggUpdating, ggProgress, syncGGToCost, applyGGPriceText, allGames, showToast, exportDB, importDB, fetchGGForSelected }) {
  const mobile = useMobile();
  const [pasteText, setPasteText] = useState('');
  const [showPaste, setShowPaste] = useState(false);
  const [showNames, setShowNames] = useState(false);
  const [selected, setSelected] = useState(() => new Set());
  const fileInputRef = useRef(null);
  const namesRef = useRef(null);

  const selectedNames = allGames.filter(g => selected.has(g.id)).map(g => g.name);
  const selectedNamesText = selectedNames.join('\n');

  function toggleSelect(id) {
    setSelected(prev => {
      const next = new Set(prev);
      if (next.has(id)) next.delete(id); else next.add(id);
      return next;
    });
  }
  function toggleSelectAllVisible() {
    setSelected(prev => {
      const visibleIds = games.map(g => g.id);
      const allSelected = visibleIds.every(id => prev.has(id));
      const next = new Set(prev);
      if (allSelected) { visibleIds.forEach(id => next.delete(id)); }
      else { visibleIds.forEach(id => next.add(id)); }
      return next;
    });
  }
  const allVisibleSelected = games.length > 0 && games.every(g => selected.has(g.id));

  function showSelectedNames() {
    if (selected.size === 0) { showToast('Сначала отметь игры галочками', 'error'); return; }
    setShowNames(true);
    try {
      navigator.clipboard?.writeText(selectedNamesText).then(
        () => showToast(`Скопировано ${selected.size} названий`, 'success'),
        () => {}
      );
    } catch {}
    setTimeout(() => { if (namesRef.current) { namesRef.current.focus(); namesRef.current.select(); } }, 50);
  }

  function handleApply() {
    applyGGPriceText(pasteText);
    setPasteText('');
    setShowPaste(false);
  }

  function handleFilePick(e) {
    const file = e.target.files && e.target.files[0];
    if (file) importDB(file);
    e.target.value = ''; // reset so same file can be re-imported
  }

  return (
    <div style={styles.viewWrap}>
      <div style={{ display: 'flex', alignItems: 'flex-start', justifyContent: 'space-between', gap: 12 }}>
        <div>
          <h1 style={styles.h1}>База цен</h1>
          <p style={styles.subtitle}>{allCount} игр. Цена сохраняется один раз — при повторных поставках просто подставляется.</p>
        </div>
        <div style={{ display: 'flex', gap: 8, flexWrap: 'wrap', justifyContent: 'flex-end' }}>
          <button onClick={exportDB} style={styles.btnGhostIcon} title="Сохранить игры и поставщиков в один JSON-файл">
            <Download size={13} /> Экспорт всего
          </button>
          <button onClick={() => fileInputRef.current && fileInputRef.current.click()} style={styles.btnGhostIcon} title="Загрузить игры и поставщиков из JSON-файла">
            <Upload size={13} /> Импорт всего
          </button>
          <button onClick={mergeDuplicates} style={styles.btnGhostIcon} title="Найти и объединить повторяющиеся названия">
            <Wand2 size={13} /> Объединить дубли
          </button>
          <input ref={fileInputRef} type="file" accept="application/json,.json" onChange={handleFilePick} style={{ display: 'none' }} />
        </div>
      </div>

      <div style={styles.ggPanel}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, flexWrap: 'wrap' }}>
          <span style={{ fontSize: 12.5, color: '#d1d5db', fontWeight: 600, display: 'flex', alignItems: 'center', gap: 6 }}>
            <RefreshCw size={13} color="#a78bfa" /> Цены с gg.deals (кейшоп, USD)
          </span>
          <span style={{ fontSize: 11.5, color: selected.size ? '#a78bfa' : '#6b7280' }}>
            {selected.size ? `выбрано: ${selected.size}` : 'отметь игры галочками'}
          </span>
          <span style={{ flex: 1 }} />
          <button onClick={showSelectedNames} disabled={selected.size === 0} style={{ ...styles.btnGhostIcon, opacity: selected.size ? 1 : 0.45 }} title="Показать названия выбранных игр для отправки Клоду">
            <Copy size={13} /> Цены на выбранные
          </button>
          {fetchGGForSelected && (
            <button onClick={() => fetchGGForSelected(Array.from(selected))} disabled={selected.size === 0 || ggUpdating} style={{ ...styles.btnGhostIcon, opacity: (selected.size && !ggUpdating) ? 1 : 0.45 }} title="Попробовать достать цены автоматически через CORS-прокси (может не сработать)">
              <RefreshCw size={13} style={ggUpdating ? { animation: 'spin 1s linear infinite' } : {}} /> {ggUpdating && ggProgress ? `${ggProgress.done}/${ggProgress.total}` : 'Авто (прокси)'}
            </button>
          )}
          <button onClick={() => setShowPaste(s => !s)} style={styles.btnPrimary}>
            <Plus size={14} /> Вставить цены
          </button>
        </div>
        <div style={{ fontSize: 11, color: '#6b7280', marginTop: 8, lineHeight: 1.5 }}>
          Отметь нужные игры галочками → «Цены на выбранные» покажет их названия → скопируй и пришли Клоду → вставь его ответ через «Вставить цены». Кнопка «Авто (прокси)» пробует достать цены сама, но может не сработать.
        </div>
        {fetchGGForSelected && (
          <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginTop: 8 }}>
            <span style={{ fontSize: 11, color: '#6b7280' }}>API-ключ gg.deals (для «Авто»):</span>
            <input
              type="password"
              value={ggKey}
              onChange={e => saveGGKeyHandler(e.target.value)}
              placeholder="нужен только для авто-режима"
              style={{ ...styles.inputSmall, width: 180 }}
            />
          </div>
        )}

        {showNames && (
          <div style={{ marginTop: 12 }}>
            <div style={{ fontSize: 11, color: '#a78bfa', marginBottom: 6 }}>Названия выбранных игр — выдели (Ctrl+A) и скопируй (Ctrl+C):</div>
            <textarea
              ref={namesRef}
              readOnly
              value={selectedNamesText}
              onClick={e => e.target.select()}
              style={{ ...styles.textarea, fontSize: 12 }}
              rows={Math.min(14, Math.max(3, selectedNames.length))}
            />
            <button onClick={() => setShowNames(false)} style={{ ...styles.btnGhost, marginTop: 8 }}>Скрыть</button>
          </div>
        )}

        {showPaste && (
          <div style={{ marginTop: 12 }}>
            <textarea
              value={pasteText}
              onChange={e => setPasteText(e.target.value)}
              placeholder={`Вставь ответ Клода в формате:\nDevil May Cry 5 = 6.78\nDmC: Devil May Cry = 4.05`}
              style={{ ...styles.textarea, fontSize: 12 }}
              rows={8}
            />
            <div style={{ display: 'flex', gap: 8, marginTop: 8 }}>
              <button onClick={handleApply} disabled={!pasteText.trim()} style={{ ...styles.btnPrimary, opacity: pasteText.trim() ? 1 : 0.4 }}>
                <Check size={14} /> Применить к базе
              </button>
              <button onClick={() => { setShowPaste(false); setPasteText(''); }} style={styles.btnGhost}>Отмена</button>
            </div>
          </div>
        )}
      </div>

      <div style={styles.searchBar}>
        <Search size={15} color="#6b7280" />
        <input value={search} onChange={e => setSearch(e.target.value)} placeholder="Поиск по названию…" style={styles.searchInput} />
      </div>

      {games.length === 0 && <div style={styles.emptyState}>{search ? 'Ничего не найдено' : 'База пока пуста — сделай первый импорт'}</div>}

      {games.length > 0 && (
        <div style={styles.dbHeaderRow}>
          <span style={{ width: 26, display: 'flex', justifyContent: 'center' }}>
            <input type="checkbox" checked={allVisibleSelected} onChange={toggleSelectAllVisible} style={{ cursor: 'pointer', accentColor: '#a78bfa' }} title="Выбрать все видимые" />
          </span>
          <span style={{ flex: 1 }}>Игра</span>
          <span style={{ width: 130, textAlign: 'center' }}>Моя цена</span>
          <span style={{ width: 150, textAlign: 'center' }}>gg.deals (кейшоп)</span>
          <span style={{ width: 110, textAlign: 'center' }}>GG Deals × 0,7</span>
          <span style={{ width: 60 }} />
        </div>
      )}

      <div style={{ display: 'flex', flexDirection: 'column', gap: 6 }}>
        {games.map(g => {
          const x07 = g.ggKeyshop ? (Math.floor(parseFloat(g.ggKeyshop) * 0.7 * 10) / 10).toFixed(1) : null;
          return mobile ? (
            // ---- MOBILE CARD ----
            <div key={g.id} style={{ ...styles.priceRow, ...(selected.has(g.id) ? { borderColor: '#a78bfa55', background: '#1a1530' } : {}), flexDirection: 'column', gap: 10 }}>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8 }}>
                <input type="checkbox" checked={selected.has(g.id)} onChange={() => toggleSelect(g.id)} style={{ cursor: 'pointer', accentColor: '#a78bfa', width: 18, height: 18, flexShrink: 0 }} />
                <div style={{ flex: 1, minWidth: 0 }}>
                  <div style={{ fontWeight: 600, fontSize: 15, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{g.name}</div>
                </div>
                <button onClick={() => deleteGame(g.id)} style={{ ...styles.iconBtnDanger, width: 36, height: 36, flexShrink: 0 }}><Trash2 size={15} /></button>
              </div>
              <div style={{ display: 'flex', alignItems: 'center', gap: 8, paddingLeft: 26 }}>
                <input type="number" step="0.01" value={g.costPrice} onChange={e => updateGamePrice(g.id, 'costPrice', parseFloat(e.target.value) || 0)} style={{ ...styles.inputSmall, width: 80 }} />
                <select value={g.currency} onChange={e => updateGamePrice(g.id, 'currency', e.target.value)} style={styles.selectSmall}>{CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
                {g.ggKeyshop && <span style={{ fontSize: 13, color: '#4ade80', fontWeight: 600 }}>{g.ggKeyshop}</span>}
                {x07 && <span style={{ fontSize: 13, color: '#a78bfa', fontWeight: 600 }}>{x07}</span>}
                {g.ggKeyshop && <button onClick={() => syncGGToCost(g.id)} style={{ ...styles.iconBtn, width: 36, height: 36 }}><ArrowLeftRight size={15} /></button>}
              </div>
            </div>
          ) : (
            // ---- DESKTOP ROW ----
            <div key={g.id} style={{ ...styles.priceRow, ...(selected.has(g.id) ? { borderColor: '#a78bfa55', background: '#1a1530' } : {}), display: 'flex', alignItems: 'center', gap: 0 }}>
              <div style={{ width: 26, flexShrink: 0, display: 'flex', justifyContent: 'center' }}>
                <input type="checkbox" checked={selected.has(g.id)} onChange={() => toggleSelect(g.id)} style={{ cursor: 'pointer', accentColor: '#a78bfa' }} />
              </div>
              <div style={{ flex: 1, minWidth: 0, paddingRight: 12 }}>
                <div style={{ fontWeight: 600, fontSize: 13.5, overflow: 'hidden', textOverflow: 'ellipsis', whiteSpace: 'nowrap' }}>{g.name}</div>
                {g.ggUpdatedAt && <div style={{ fontSize: 10.5, color: '#6b7280' }}>обновлено {new Date(g.ggUpdatedAt).toLocaleDateString()}</div>}
              </div>
              <div style={{ width: 130, display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 5, flexShrink: 0 }}>

                <select value={g.currency} onChange={e => updateGamePrice(g.id, 'currency', e.target.value)} style={styles.selectSmall}>{CURRENCIES.map(c => <option key={c} value={c}>{c}</option>)}</select>
              </div>
              <div style={{ width: 150, flexShrink: 0, textAlign: 'center' }}>
                {g.ggKeyshop
                  ? <span style={{ fontSize: 13, color: '#4ade80', fontWeight: 600 }}>{g.ggKeyshop} {g.ggCurrency || 'USD'}</span>

              </div>
              <div style={{ width: 110, flexShrink: 0, textAlign: 'center' }}>
                {x07
                  ? <span style={{ fontSize: 13, color: '#a78bfa', fontWeight: 600 }}>{x07}</span>
                  : <span style={{ fontSize: 11.5, color: '#4b5563' }}>—</span>}
              </div>
              <div style={{ width: 60, flexShrink: 0, display: 'flex', gap: 4, justifyContent: 'flex-end' }}>
                <button onClick={() => syncGGToCost(g.id)} disabled={!g.ggKeyshop} style={{ ...styles.iconBtn, opacity: g.ggKeyshop ? 1 : 0.35 }} title="Синхронизировать с gg.deals"><ArrowLeftRight size={13} /></button>
                <button onClick={() => deleteGame(g.id)} style={styles.iconBtnDanger} title="Удалить"><Trash2 size={13} /></button>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function GiftReviewView({ giftParseResult, giftPercent, setGiftPercent, giftBrand, giftCurrency, giftRate, setGiftRate, giftRateLoading, cancelGiftReview, giftGroupedText, copyGiftGroupedText, giftImportPayout, giftCostUSD }) {
  const { groups, trash } = giftParseResult;
  const totalKeys = groups.reduce((s, g) => s + g.keys.length, 0);
  const [priceMode, setPriceMode] = React.useState('percent'); // 'percent' | 'manual'
  const [manualPrices, setManualPrices] = React.useState(() =>
    Object.fromEntries(groups.map((g, i) => [i, '']))
  );

  function setManualPrice(idx, val) {
    setManualPrices(prev => ({ ...prev, [idx]: val }));
  }

  function getDisplayCost(g, idx) {
    if (priceMode === 'percent') {
      return giftCostUSD(g.nominal);
    } else {
      const p = parseFloat(manualPrices[idx]);
      return isNaN(p) ? null : p;
    }
  }

  // for grouped text and payout in manual mode, override cost calculation
  const manualGroupedText = React.useMemo(() => {
    if (priceMode !== 'manual') return null;
    const lines = [];
    for (let i = 0; i < groups.length; i++) {
      const g = groups[i];
      const cost = getDisplayCost(g, i);
      const costLabel = cost !== null ? ` — ${cost.toFixed(2)} USD` : '';
      lines.push(`${g.brand} ${g.nominal} ${g.currency}${costLabel}`);
      for (const k of g.keys) lines.push(k);
      lines.push('');
    }
    return lines.join('\n').trim();
  }, [priceMode, manualPrices, groups]);

  const manualPayout = React.useMemo(() => {
    if (priceMode !== 'manual') return null;
    let totalUSD = 0, totalK = 0;
    const lines = [];
    for (let i = 0; i < groups.length; i++) {
      const g = groups[i];
      const cost = getDisplayCost(g, i);
      if (cost === null) continue;
      const lineTotal = cost * g.keys.length;
      totalUSD += lineTotal; totalK += g.keys.length;
      lines.push({ name: `${g.brand} ${g.nominal} ${g.currency}`, qty: g.keys.length, costPerKey: cost, lineTotal });
    }
    return { totalUSD, totalKeys: totalK, lines };
  }, [priceMode, manualPrices, groups]);

  const activeGroupedText = priceMode === 'manual' ? (manualGroupedText || '') : giftGroupedText;
  const activePayout = priceMode === 'manual' ? manualPayout : giftImportPayout;

  return (
    <div style={styles.viewWrap}>
      <button onClick={cancelGiftReview} style={styles.backBtn}><ArrowLeft size={14} /> Назад</button>
      <h1 style={styles.h1}>{giftBrand} {giftCurrency} — расчёт</h1>
      <p style={styles.subtitle}>
        Найдено {groups.length} номиналов, {totalKeys} ключей
        {trash.length > 0 && <span style={{ color: '#fb923c' }}> · {trash.length} строк не распознано</span>}
      </p>

      {/* Mode toggle */}
      <div style={{ display: 'flex', gap: 8, marginBottom: 16 }}>
        <button
          onClick={() => setPriceMode('percent')}
          style={{ ...styles.chip, ...(priceMode === 'percent' ? styles.chipActive : {}) }}
        >% от номинала</button>
        <button
          onClick={() => setPriceMode('manual')}
          style={{ ...styles.chip, ...(priceMode === 'manual' ? styles.chipActive : {}) }}
        >Ввести цену вручную</button>
      </div>

      {/* Percent mode inputs */}
      {priceMode === 'percent' && (
        <div style={{ display: 'flex', gap: 10, marginBottom: 16, flexWrap: 'wrap' }}>
          <div style={styles.card}>
            <label style={styles.label}>% от номинала</label>
            <input
              type="number" step="0.1" placeholder="напр. 80"
              value={giftPercent}
              onChange={e => setGiftPercent(e.target.value)}
              style={{ ...styles.inputSmall, width: 100, fontSize: 14 }}
              autoFocus
            />
          </div>
          {giftCurrency !== 'USD' && (
            <div style={styles.card}>
              <label style={styles.label}>Курс 1 {giftCurrency} → USD</label>
              <div style={{ display: 'flex', alignItems: 'center', gap: 6 }}>
                <input
                  type="number" step="0.0001" placeholder="курс"
                  value={giftRate}
                  onChange={e => setGiftRate(e.target.value)}
                  style={{ ...styles.inputSmall, width: 100, fontSize: 14 }}
                />
                {giftRateLoading && <span style={{ fontSize: 11, color: '#6b7280' }}>загрузка…</span>}
              </div>
            </div>
          )}
        </div>
      )}

      {/* Positions list */}
      {groups.length > 0 && (
        <div style={styles.section}>
          <h3 style={styles.h3}>Позиции ({groups.length})</h3>
          <div style={styles.tableWrap}>
            {groups.map((g, idx) => {
              const cost = getDisplayCost(g, idx);
              return (
                <div key={idx} style={styles.matchedRow}>
                  <div style={{ flex: 1 }}>
                    <div style={{ fontWeight: 600, fontSize: 13.5 }}>{g.brand} {g.nominal} {g.currency}</div>
                  </div>
                  {priceMode === 'manual' ? (
                    <input
                      type="number" step="0.01"
                      placeholder="цена USD"
                      value={manualPrices[idx]}
                      onChange={e => setManualPrice(idx, e.target.value)}
                      style={{ ...styles.inputSmall, width: 90, borderColor: manualPrices[idx] === '' ? '#ef4444' : '#374151' }}
                    />
                  ) : (
                    <div style={{ fontSize: 12.5, color: cost !== null ? '#4ade80' : '#6b7280' }}>
                      {cost !== null ? `${cost.toFixed(2)} USD/шт` : 'впиши % и курс'}
                    </div>
                  )}
                  <div style={styles.keyCountBadge}>{g.keys.length} ключей</div>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {trash.length > 0 && (
        <div style={styles.section}>
          <h3 style={{ ...styles.h3, color: '#fb923c' }}><X size={15} /> Не распознано ({trash.length})</h3>
          <div style={styles.trashBox}>
            {trash.slice(0, 30).map((t, i) => (
              <div key={i} style={styles.trashLine}><span style={{ color: '#9ca3af' }}>{t.raw}</span><span style={{ color: '#6b7280', fontSize: 11 }}> — {t.reason}</span></div>
            ))}
            {trash.length > 30 && <div style={{ color: '#6b7280', fontSize: 12, marginTop: 6 }}>и ещё {trash.length - 30}…</div>}
          </div>
        </div>
      )}

      {activePayout && activePayout.lines.length > 0 && (
        <div style={styles.section}>
          <h3 style={styles.h3}>Сумма к оплате (USD)</h3>
          <div style={styles.summaryGrid}>
            <div style={styles.summaryCard}><div style={styles.summaryLabel}>Позиций</div><div style={styles.summaryValue}>{activePayout.lines.length}</div></div>
            <div style={styles.summaryCard}><div style={styles.summaryLabel}>Ключей</div><div style={styles.summaryValue}>{activePayout.totalKeys}</div></div>
            <div style={{ ...styles.summaryCard, borderColor: '#ff6b4a44' }}><div style={styles.summaryLabel}>Итого, USD</div><div style={{ ...styles.summaryValue, color: '#ff6b4a' }}>{activePayout.totalUSD.toFixed(2)}</div></div>
          </div>
          <div style={styles.payoutTable}>
            <div style={styles.payoutTableHeader}><span style={{ flex: 1 }}>Номинал</span><span style={{ width: 50, textAlign: 'right' }}>Кол</span><span style={{ width: 90, textAlign: 'right' }}>USD/шт</span><span style={{ width: 90, textAlign: 'right' }}>Сумма</span></div>
            {activePayout.lines.map((l, i) => (
              <div key={i} style={styles.payoutTableRow}>
                <span style={{ flex: 1, fontSize: 13 }}>{l.name}</span>
                <span style={{ width: 50, textAlign: 'right', fontSize: 13, color: '#9ca3af' }}>{l.qty}</span>
                <span style={{ width: 90, textAlign: 'right', fontSize: 13, color: '#4ade80' }}>{l.costPerKey.toFixed(2)}</span>
                <span style={{ width: 90, textAlign: 'right', fontSize: 13, fontWeight: 600 }}>{l.lineTotal.toFixed(2)}</span>
              </div>
            ))}
          </div>
        </div>
      )}

      <div style={styles.section}>
        <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', marginBottom: 10 }}>
          <h3 style={{ ...styles.h3, margin: 0 }}>Сгруппированный список ключей</h3>
          <button onClick={() => { try { navigator.clipboard?.writeText(activeGroupedText); } catch {} }} style={styles.btnGhostIcon}><Copy size={13} /> Скопировать всё</button>
        </div>
        <textarea readOnly value={activeGroupedText} style={{ ...styles.textarea, fontSize: 12 }} rows={14} onClick={e => e.target.select()} />
      </div>
    </div>
  );
}
